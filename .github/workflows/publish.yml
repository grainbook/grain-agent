name: publish

# Publish workspace crates to crates.io on every `v*` tag.
# Respects the ordered dependency graph so no crate is published
# before its dependencies are live.

on:
  push:
    tags: ["v*"]

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Log in to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish workspace crates
        run: ./scripts/publish.sh --yes

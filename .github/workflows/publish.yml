name: publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.1-beta1)"
        required: true
        type: string

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      # ── resolve version ──
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VER"

      # ── check all crate versions match ──
      - name: Check version consistency
        run: |
          EXPECT="${{ steps.version.outputs.version }}"
          mismatch=0
          for toml in \
            grain-agent-core/Cargo.toml \
            grain-agent-harness/Cargo.toml \
            grain-llm-models/Cargo.toml \
            grain-llm-genai/Cargo.toml \
            grain-ai-agent-headless/Cargo.toml \
            grain-ai-agent-tui/Cargo.toml \
            grain-script-boa/Cargo.toml \
            grain-script-rhai/Cargo.toml \
            grain-deepseek-pack/Cargo.toml \
            grain-plugin-wasm/Cargo.toml
          do
            actual=$(grep '^version' "$toml" | sed 's/.*"\(.*\)".*/\1/')
            if [ "$actual" != "$EXPECT" ]; then
              echo "ERROR: $toml has version $actual, expected $EXPECT"
              mismatch=1
            fi
          done
          exit $mismatch

      # ── Tier 0: no internal deps ──
      - name: Publish grain-agent-core
        run: cargo publish -p grain-agent-core

      - name: Publish grain-llm-models
        run: cargo publish -p grain-llm-models

      # Brief pause to let crates.io index propagate
      - name: Wait for crates.io index
        run: sleep 30

      # ── Tier 1: depend on core + models ──
      - name: Publish grain-llm-genai
        run: cargo publish -p grain-llm-genai

      - name: Publish grain-agent-harness
        run: cargo publish -p grain-agent-harness

      - name: Publish grain-deepseek-pack
        run: cargo publish -p grain-deepseek-pack

      - name: Publish grain-script-boa
        run: cargo publish -p grain-script-boa

      - name: Publish grain-script-rhai
        run: cargo publish -p grain-script-rhai

      - name: Publish grain-plugin-wasm
        run: cargo publish -p grain-plugin-wasm

      # Pause again
      - name: Wait for crates.io index
        run: sleep 30

      # ── Tier 2: depends on tier-0 + tier-1 ──
      - name: Publish grain-ai-agent-headless
        run: cargo publish -p grain-ai-agent-headless

      # Final pause
      - name: Wait for crates.io index
        run: sleep 30

      # ── Tier 3: depends on headless ──
      - name: Publish grain-ai-agent-tui
        run: cargo publish -p grain-ai-agent-tui

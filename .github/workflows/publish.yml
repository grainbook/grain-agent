name: publish

# Publish workspace crates to crates.io on every `v*` tag.
# Respects the ordered dependency graph so no crate is published
# before its dependencies are live.

on:
  push:
    tags: ["v*"]

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Log in to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # ── Publish in dependency order ──────────────────────────────────
      # The graph:
      #   grain-llm-models        ← leaf
      #   grain-agent-core         ← depends on grain-llm-models
      #   grain-llm-genai          ← depends on grain-llm-models
      #   grain-agent-harness       ← depends on grain-agent-core
      #   grain-script-boa         ← leaf
      #   grain-script-rhai       ← leaf
      #   grain-pi-compat         ← leaf
      #   grain-deepseek-pack     ← leaf
      #   grain-plugin-wasm       ← leaf
      #   lazy-gagent             ← leaf
      #   grain-ai-agent-headless  ← depends on many workspace crates
      #   grain-ai-agent-tui       ← depends on grain-ai-agent-headless

      # Tier 1 — no internal deps
      - name: Publish grain-llm-models
        run: cargo publish -p grain-llm-models

      - name: Publish grain-script-boa
        run: cargo publish -p grain-script-boa

      - name: Publish grain-script-rhai
        run: cargo publish -p grain-script-rhai

      - name: Publish grain-pi-compat
        run: cargo publish -p grain-pi-compat

      - name: Publish grain-deepseek-pack
        run: cargo publish -p grain-deepseek-pack

      - name: Publish grain-plugin-wasm
        run: cargo publish -p grain-plugin-wasm

      - name: Publish lazy-gagent
        run: cargo publish -p lazy-gagent

      # Tier 2 — depend on tier-1
      - name: Publish grain-agent-core
        run: cargo publish -p grain-agent-core

      - name: Publish grain-llm-genai
        run: cargo publish -p grain-llm-genai

      # Tier 3 — depends on tier-2
      - name: Publish grain-agent-harness
        run: cargo publish -p grain-agent-harness

      # Tier 4 — binary crates (depend on all above)
      - name: Publish grain-ai-agent-headless
        run: cargo publish -p grain-ai-agent-headless

      - name: Publish grain-ai-agent-tui
        run: cargo publish -p grain-ai-agent-tui

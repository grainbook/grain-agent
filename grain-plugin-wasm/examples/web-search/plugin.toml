# Example manifest for the web-search WASM plugin.
# Copy this to `<workspace>/.grain/plugins/web-search/plugin.toml`
# next to the compiled `plugin.wasm`.

name = "web-search"
version = "0.1.0"
description = "Exa search + URL fetch (WASM, sandboxed)"
author = "grain"

[wasm]
# `http` — host_http_get / host_http_post (REQUIRED: Exa API + fetch)
# `env` — host_env_get (REQUIRED: read EXA_API_KEY)
# `log` — host_log (recommended: see plugin logs)
module = "target/wasm32-wasip1/release/web_search_plugin.wasm"
capabilities = ["http", "env", "log"]

# Optional: set EXA_API_KEY directly here instead of exporting it.
# The wasm host checks this map before falling back to OS env vars.
#
# You can also set it in plugin-spec.toml at the top level:
#   [[plugin]]
#   name = "web-search"
#   src = "..."
#   EXA_API_KEY = "your-key"
[wasm.env]
# EXA_API_KEY = "your-exa-api-key"

# Example manifest for the web-search WASM plugin.
# Copy this to `<workspace>/.grain/plugins/web-search/plugin.toml`
# next to the compiled `plugin.wasm`.

name = "web-search"
version = "0.2.0"
description = "Multi-provider web search (Exa / Tavily / SearXNG) + URL fetch (WASM, sandboxed)"
author = "grain"

[wasm]
# `http` — host_http_get / host_http_post (REQUIRED: external API calls)
# `env` — host_env_get (REQUIRED: read API keys / base URLs)
# `log` — host_log (recommended: see plugin logs)
module = "target/wasm32-wasip1/release/web_search_plugin.wasm"
capabilities = ["http", "env", "log"]

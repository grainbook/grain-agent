[package]
name = "lazy-gagent"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "lazy.gagent — plugin manager SDK for grain-ai-agent-tui. Manifest format, plugin discovery, and (planned) registries for skill / theme / tool / hook / slash-command extension points. Phase A is a façade on top of the TUI's existing skills + themes loading paths."

[dependencies]
serde = { workspace = true }
toml = { workspace = true }

[dev-dependencies]
tempfile = "3"
